<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Comments</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h2>Trained Comments</h2>
    <form action="{{ url_for('predict_sentiment') }}" method="post">
        <table border="1">
            <tr>
                <th>#</th>
                <th>Comment</th>
            </tr>
            {% for comment in comments %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ comment['User Comments'] }}</td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <button type="submit">Predict Sentiment</button>
    </form>
    <br>
    <a href="{{ url_for('home') }}">Go to Home</a>
</body>
</html>
